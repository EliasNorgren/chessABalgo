build-image:
  stage: build   # 🔹 MUST match one of your stages
  image: docker:latest

  services:
    - name: docker:dind
      command:
        - "--insecure-registry=registry.eliashouse.ddns.net"
        - "--host=tcp://0.0.0.0:2375"
        - "--tls=false"

  variables:
    IMAGE_TAG: "registry.eliashouse.ddns.net/root/chessabalgo:latest"

  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login registry.eliashouse.ddns.net -u "$CI_REGISTRY_USER" --password-stdin

  script:
    - echo building image with tag "$IMAGE_TAG"
    - docker build -t "$IMAGE_TAG" Java/chessAB/
    - docker push "$IMAGE_TAG"

  only:
    - main