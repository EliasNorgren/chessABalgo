stages:
  - build

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

build-image:
  image: docker:latest

  services:
    - name: docker:dind
      command:
        - "--insecure-registry=registry.eliashouse.ddns.net"
        - "--host=tcp://0.0.0.0:2375"
        - "--tls=false"

  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login registry.eliashouse.ddns.net -u "$CI_REGISTRY_USER" --password-stdin

  script:
    - docker build -t "$IMAGE_TAG" Java/chessAB/
    - docker push "$IMAGE_TAG"

  only:
    - main