stages:
  - build

variables:
  IMAGE_TAG: registry.eliashouse.ddns.net/root/chessabalgo:$CI_COMMIT_REF_SLUG

build-image:
  stage: build
  image: docker:latest

  services:
    - name: docker:dind
      command:
        - "--insecure-registry=registry.eliashouse.ddns.net"
        - "--tls=false"

  before_script:
    # 🔥 Force HTTP explicitly
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login registry.eliashouse.ddns.net -u "$CI_REGISTRY_USER" --password-stdin

  script:
    - docker build -t "$IMAGE_TAG" Java/chessAB/
    - docker push "$IMAGE_TAG"

  only:
    - main